# ============================================================
# Tourist Cocoon – application.properties
# ============================================================

# --- Servidor ---
server.port=8080
server.servlet.context-path=/api

# --- Base de datos (H2 en memoria para desarrollo local) ---
# Para producción con MySQL, comenta el bloque H2 y descomenta MySQL.
spring.datasource.url=jdbc:h2:mem:touristcocoondb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- MySQL (producción) ---
# spring.datasource.url=jdbc:mysql://localhost:3306/tourist_cocoon_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Madrid
# spring.datasource.username=tu_usuario
# spring.datasource.password=tu_contraseña
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Google Calendar (integración obligatoria según SDD) ---
# Descarga el fichero service-account.json desde Google Cloud Console
# y colócalo fuera del repo (no commitear credenciales).
google.calendar.credentials-path=${GOOGLE_CREDENTIALS_PATH:}
google.calendar.calendar-id=${GOOGLE_CALENDAR_ID:primary}

# --- Datos de carga inicial (cápsulas del hostal) ---
# El DataInitializer las crea si la BD está vacía.
app.capsulas.planta1=C-101,C-102,C-103,C-104,C-105
app.capsulas.planta2=C-201,C-202,C-203,C-204,C-205
