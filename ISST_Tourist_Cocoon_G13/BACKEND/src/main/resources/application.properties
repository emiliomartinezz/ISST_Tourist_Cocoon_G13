# ============================================================
# Tourist Cocoon – application.properties
# ============================================================

# --- Servidor ---
server.port=8080
server.servlet.context-path=/api

# --- Base de datos (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/tourist_cocoon_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=cocoon_user
spring.datasource.password=cocoon123

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false

# --- Google Calendar (integración obligatoria según SDD) ---
# Descarga el fichero service-account.json desde Google Cloud Console
# y colócalo fuera del repo (no commitear credenciales).
google.calendar.credentials-path=${GOOGLE_CREDENTIALS_PATH:}
google.calendar.calendar-id=${GOOGLE_CALENDAR_ID:primary}

# --- Datos de carga inicial (cápsulas del hostal) ---
# El DataInitializer las crea si la BD está vacía.
app.capsulas.planta1=C-101,C-102,C-103,C-104,C-105
app.capsulas.planta2=C-201,C-202,C-203,C-204,C-205
app.capsulas.planta3=C-301,C-302,C-303,C-304,C-305
